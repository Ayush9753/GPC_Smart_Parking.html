<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPC Smart Parking</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0e1a;
      --panel: #0f1628;
      --border: #1e3a5f;
      --accent: #00d4ff;
      --accent2: #0077cc;
      --green: #00ff88;
      --red: #ff3355;
      --yellow: #ffd700;
      --text: #cce8ff;
      --dim: #5a7a99;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== LOGIN PAGE ===== */
    #loginPage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: var(--bg);
    }

    .login-header {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      font-weight: 900;
      color: var(--accent);
      text-align: center;
      letter-spacing: 3px;
      margin-bottom: 10px;
      text-shadow: 0 0 30px rgba(0,212,255,0.6);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { text-shadow: 0 0 20px rgba(0,212,255,0.5); }
      50% { text-shadow: 0 0 50px rgba(0,212,255,1), 0 0 80px rgba(0,212,255,0.4); }
    }

    .login-sub {
      font-size: 0.85rem;
      color: var(--dim);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 50px;
    }

    .login-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 50px;
      width: min(420px, 90vw);
      position: relative;
      box-shadow: 0 0 60px rgba(0,212,255,0.08), inset 0 1px 0 rgba(0,212,255,0.1);
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: -1px; left: 20px; right: 20px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .login-box h2 {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      color: var(--accent);
      text-align: center;
      letter-spacing: 3px;
      margin-bottom: 30px;
    }

    .field-group {
      margin-bottom: 22px;
    }

    .field-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .field-group input {
      width: 100%;
      background: rgba(0,212,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 2px;
      outline: none;
      transition: all 0.3s;
    }

    .field-group input:focus {
      border-color: var(--accent);
      background: rgba(0,212,255,0.08);
      box-shadow: 0 0 20px rgba(0,212,255,0.15);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none;
      border-radius: 8px;
      color: #000;
      font-family: 'Orbitron', monospace;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.3s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,212,255,0.4);
    }

    .login-btn:active { transform: translateY(0); }

    .error-msg {
      color: var(--red);
      font-size: 0.85rem;
      text-align: center;
      margin-top: 14px;
      height: 20px;
      letter-spacing: 1px;
    }

    /* ===== MAIN DASHBOARD ===== */
    #dashboard {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      height: 64px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .car-icon {
      font-size: 1.6rem;
    }

    .site-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.9rem, 2.5vw, 1.4rem);
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(0,212,255,0.5);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .user-badge {
      background: rgba(0,212,255,0.1);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,212,255,0.08);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 8px 16px;
      color: var(--accent);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .refresh-btn:hover {
      background: rgba(0,212,255,0.18);
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
    }

    .refresh-icon {
      font-size: 1rem;
      display: inline-block;
      transition: transform 0.5s;
    }

    .refresh-btn:hover .refresh-icon {
      transform: rotate(360deg);
    }

    .logout-btn {
      background: rgba(255,51,85,0.1);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--red);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .logout-btn:hover {
      background: rgba(255,51,85,0.2);
    }

    /* MAIN CONTENT */
    .content {
      flex: 1;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .floor-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 900;
      color: var(--yellow);
      letter-spacing: 4px;
      text-align: center;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(255,215,0,0.4);
    }

    .floor-desc {
      color: var(--dim);
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 40px;
    }

    /* SLOT GRID */
    .slots-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: min(600px, 95vw);
    }

    .slot-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .slot-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
      transition: background 0.3s;
    }

    .slot-card.empty::before { background: var(--green); }
    .slot-card.filled::before { background: var(--red); }

    .slot-card:hover {
      transform: translateX(6px);
      border-color: rgba(0,212,255,0.4);
      box-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }

    .slot-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .slot-number {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 70px;
    }

    .slot-icon {
      font-size: 1.8rem;
    }

    .slot-label {
      font-size: 1rem;
      color: var(--dim);
      letter-spacing: 1px;
    }

    .slot-badge {
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 7px 18px;
      border-radius: 20px;
      border: 1.5px solid;
      transition: all 0.3s;
    }

    .slot-card.empty .slot-badge {
      color: var(--green);
      border-color: var(--green);
      background: rgba(0,255,136,0.08);
      box-shadow: 0 0 12px rgba(0,255,136,0.2);
    }

    .slot-card.filled .slot-badge {
      color: var(--red);
      border-color: var(--red);
      background: rgba(255,51,85,0.08);
      box-shadow: 0 0 12px rgba(255,51,85,0.2);
    }

    /* STATS BAR */
    .stats-bar {
      margin-top: 40px;
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    .stat-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }
    .stat-dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .stat-dot.red { background: var(--red); box-shadow: 0 0 8px var(--red); }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .stat-count { font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 700; }
    .stat-label { color: var(--dim); }

    /* TIMESTAMP */
    .timestamp {
      margin-top: 30px;
      color: var(--dim);
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-align: center;
    }

    /* Scan line animation */
    .scan-line {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan 4s linear infinite;
      opacity: 0.4;
      pointer-events: none;
      z-index: 200;
    }
    @keyframes scan {
      0% { top: 0; }
      100% { top: 100vh; }
    }

    .fade-in { animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="scan-line"></div>

<!-- ===== LOGIN PAGE ===== -->
<div id="loginPage">
  <div class="login-header">🅿 GPC SMART PARKING</div>
  <div class="login-sub">Secure Access System</div>

  <div class="login-box">
    <h2>— LOGIN —</h2>
    <div class="field-group">
      <label>User ID</label>
      <input type="text" id="userId" placeholder="0001 / 0002 / 0003" maxlength="4" />
    </div>
    <div class="field-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="login-btn" onclick="doLogin()">ACCESS SYSTEM</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="car-icon">🅿</span>
      <span class="site-title">GPC SMART PARKING</span>
    </div>
    <div class="topbar-right">
      <span class="user-badge" id="userBadge">USER: 0001</span>
      <button class="refresh-btn" onclick="refreshPage()">
        <span class="refresh-icon">↻</span> REFRESH
      </button>
      <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="floor-title">— FLOOR 1 —</div>
    <div class="floor-desc">Parking Slot Status · Click to Toggle</div>

    <div class="slots-container" id="slotsContainer">
      <!-- Slots will be generated by JS -->
    </div>

    <div class="stats-bar" id="statsBar">
      <!-- Stats generated by JS -->
    </div>

    <div class="timestamp" id="timestamp"></div>
  </div>
</div>

<script>
  // ===== USER DATA =====
  const USERS = {
    '0001': 'gpc@123',
    '0002': 'gpc@123',
    '0003': 'gpc@123'
  };

  // ===== SLOT STATE (stored in memory, resets on page load) =====
  let slots = [
    { id: 1, status: 'empty' },
    { id: 2, status: 'empty' },
    { id: 3, status: 'empty' },
    { id: 4, status: 'empty' },
    { id: 5, status: 'empty' },
  ];

  let currentUser = '';

  // ===== LOGIN =====
  function doLogin() {
    const uid = document.getElementById('userId').value.trim();
    const pwd = document.getElementById('password').value.trim();
    const err = document.getElementById('errorMsg');

    if (USERS[uid] && USERS[uid] === pwd) {
      err.textContent = '';
      currentUser = uid;
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('dashboard').style.display = 'flex';
      document.getElementById('userBadge').textContent = 'USER: ' + uid;
      renderSlots();
      updateTimestamp();
    } else {
      err.textContent = '✗  Invalid User ID or Password';
      document.getElementById('password').value = '';
    }
  }

  // Enter key support
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      if (document.getElementById('loginPage').style.display !== 'none' ||
          document.getElementById('loginPage').style.display === '') {
        doLogin();
      }
    }
  });

  // ===== LOGOUT =====
  function doLogout() {
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('userId').value = '';
    document.getElementById('password').value = '';
    document.getElementById('errorMsg').textContent = '';
    currentUser = '';
  }

  // ===== REFRESH =====
  function refreshPage() {
    const btn = document.querySelector('.refresh-icon');
    btn.style.transform = 'rotate(360deg)';
    setTimeout(() => { btn.style.transform = ''; }, 500);
    renderSlots();
    updateTimestamp();
  }

  // ===== TOGGLE SLOT =====
  function toggleSlot(id) {
    const slot = slots.find(s => s.id === id);
    slot.status = slot.status === 'empty' ? 'filled' : 'empty';
    renderSlots();
    updateTimestamp();
  }

  // ===== RENDER SLOTS =====
  function renderSlots() {
    const container = document.getElementById('slotsContainer');
    container.innerHTML = '';

    slots.forEach((slot, i) => {
      const isEmpty = slot.status === 'empty';
      const card = document.createElement('div');
      card.className = `slot-card ${slot.status} fade-in`;
      card.style.animationDelay = (i * 0.07) + 's';
      card.onclick = () => toggleSlot(slot.id);

      card.innerHTML = `
        <div class="slot-left">
          <div class="slot-number">SLOT ${slot.id}</div>
          <div class="slot-icon">${isEmpty ? '🟩' : '🚗'}</div>
          <div class="slot-label">${isEmpty ? 'Available' : 'Occupied'}</div>
        </div>
        <div class="slot-badge">${isEmpty ? '✓ EMPTY' : '✗ FILLED'}</div>
      `;

      container.appendChild(card);
    });

    // Stats
    const empty = slots.filter(s => s.status === 'empty').length;
    const filled = slots.length - empty;
    const statsBar = document.getElementById('statsBar');
    statsBar.innerHTML = `
      <div class="stat-chip">
        <div class="stat-dot green"></div>
        <span class="stat-count">${empty}</span>
        <span class="stat-label">Available</span>
      </div>
      <div class="stat-chip">
        <div class="stat-dot red"></div>
        <span class="stat-count">${filled}</span>
        <span class="stat-label">Occupied</span>
      </div>
      <div class="stat-chip">
        <span class="stat-count" style="color:var(--yellow)">${slots.length}</span>
        <span class="stat-label">Total Slots</span>
      </div>
    `;
  }

  // ===== TIMESTAMP =====
  function updateTimestamp() {
    const now = new Date();
    document.getElementById('timestamp').textContent =
      'Last Updated: ' + now.toLocaleDateString('hi-IN') + ' · ' + now.toLocaleTimeString('hi-IN');
  }
</script>
</body>
</html>
